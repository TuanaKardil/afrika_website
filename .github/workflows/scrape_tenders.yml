name: Run Tender Scraper

on:
  workflow_dispatch:
    inputs:
      secret:
        description: "Webhook secret for verification"
        required: true
        type: string

  # 15:00 Europe/Istanbul = 12:00 UTC
  schedule:
    - cron: "0 12 * * *"

jobs:
  tenders:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Verify webhook secret
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.secret }}" != "${{ secrets.SCRAPER_WEBHOOK_SECRET }}" ]; then
            echo "Invalid webhook secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run tender scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd scraper
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running tender scraper (UNGM + World Bank + UNDP)"
          python3 seed_tenders.py
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Tender scraper complete"
