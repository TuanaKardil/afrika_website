name: Run Tender Scraper

on:
  workflow_dispatch:
    inputs:
      secret:
        description: "Webhook secret for verification"
        required: true
        type: string

  # 15:00 Europe/Istanbul = 12:00 UTC
  schedule:
    - cron: "0 12 * * *"

jobs:
  scrape_tenders:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Verify webhook secret
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.secret }}" != "${{ secrets.SCRAPER_WEBHOOK_SECRET }}" ]; then
            echo "Invalid webhook secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run tender spiders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd scraper
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running AfDB tenders spider"
          python3 -m scrapy crawl afdb_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running World Bank tenders spider"
          python3 -m scrapy crawl worldbank_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running UNDP tenders spider"
          python3 -m scrapy crawl undp_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running Afreximbank tenders spider"
          python3 -m scrapy crawl afreximbank_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running African Union tenders spider"
          python3 -m scrapy crawl african_union_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running dgMarket tenders spider"
          python3 -m scrapy crawl dgmarket_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running UNGM tenders spider"
          python3 -m scrapy crawl ungm_tenders --set=SCRAPY_SETTINGS_MODULE=scraper.tender_settings
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] All tender spiders complete"
