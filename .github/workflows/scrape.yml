name: Run Scraper

on:
  workflow_dispatch:
    inputs:
      secret:
        description: "Webhook secret for verification"
        required: true
        type: string

  # Fallback cron: 05:00 Europe/Istanbul = 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Verify webhook secret
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.secret }}" != "${{ secrets.SCRAPER_WEBHOOK_SECRET }}" ]; then
            echo "Invalid webhook secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run spiders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scraper
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running BBC Africa spider"
          python3 -m scrapy crawl bbc_africa
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Running The Conversation Africa spider"
          python3 -m scrapy crawl conversation_africa
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Spiders complete"

  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: scrape

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Translate untranslated articles
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scraper
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Retranslating untranslated articles"
          python3 -m scraper.retranslate
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Translation complete"
