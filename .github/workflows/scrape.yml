name: Run Scraper

on:
  # Triggered by n8n via webhook
  workflow_dispatch:
    inputs:
      secret:
        description: "Webhook secret for verification"
        required: true
        type: string

  # Fallback cron: 05:00 Europe/Istanbul = 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Verify webhook secret
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.secret }}" != "${{ secrets.SCRAPER_WEBHOOK_SECRET }}" ]; then
            echo "Invalid webhook secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPER_WEBHOOK_SECRET: ${{ secrets.SCRAPER_WEBHOOK_SECRET }}
        run: bash scraper/run.sh
