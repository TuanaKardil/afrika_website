<!doctype html>
<html lang="tr"><head><meta charset="utf-8"/>
<style>
  body{margin:0;padding:24px;font-family:"Inter",system-ui,sans-serif;background:#fff;color:#212529}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:#1e6fb8;border-radius:2px;width:100%}
  .num{font-size:11px;font-weight:600;color:#212529;font-feature-settings:"tnum"}
  .label{font-size:10px;font-weight:600;color:#6b7280;letter-spacing:0.06em;text-transform:uppercase}
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="box" style="height:4px"></div><div class="num">4</div><div class="label">sp-1</div></div>
  <div class="cell"><div class="box" style="height:8px"></div><div class="num">8</div><div class="label">sp-2</div></div>
  <div class="cell"><div class="box" style="height:12px"></div><div class="num">12</div><div class="label">sp-3</div></div>
  <div class="cell"><div class="box" style="height:16px"></div><div class="num">16</div><div class="label">sp-4</div></div>
  <div class="cell"><div class="box" style="height:24px"></div><div class="num">24</div><div class="label">sp-5</div></div>
  <div class="cell"><div class="box" style="height:32px"></div><div class="num">32</div><div class="label">sp-6</div></div>
  <div class="cell"><div class="box" style="height:48px"></div><div class="num">48</div><div class="label">sp-7</div></div>
  <div class="cell"><div class="box" style="height:64px"></div><div class="num">64</div><div class="label">sp-8</div></div>
</div>
</body></html>
