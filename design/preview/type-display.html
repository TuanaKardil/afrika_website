<!doctype html>
<html lang="tr"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:24px;font-family:"Inter",system-ui,sans-serif;background:#fff;color:#212529}
  .stack{display:flex;flex-direction:column;gap:12px}
  .item{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid #e5e7eb;padding-bottom:10px}
  .item:last-child{border:0}
  .tag{font-size:10px;font-weight:600;color:#6b7280;letter-spacing:0.08em;text-transform:uppercase;width:76px;flex-shrink:0;font-feature-settings:"tnum"}
  .specimen{font-family:"Inter",system-ui,sans-serif}
</style></head>
<body>
<div class="stack">
  <div class="item"><div class="tag">Display 40/800</div><div class="specimen" style="font-size:40px;font-weight:800;letter-spacing:-0.02em;line-height:1.05">Türk müteahhitler</div></div>
  <div class="item"><div class="tag">H1 32/700</div><div class="specimen" style="font-size:32px;font-weight:700;letter-spacing:-0.015em;line-height:1.1">Cezayir'de 1,2 milyar dolar</div></div>
  <div class="item"><div class="tag">H2 24/700</div><div class="specimen" style="font-size:24px;font-weight:700;letter-spacing:-0.01em;line-height:1.2">Aselsan, Mısır anlaşmasını imzaladı</div></div>
  <div class="item"><div class="tag">H3 18/700</div><div class="specimen" style="font-size:18px;font-weight:700;line-height:1.25">Senegal LNG sahası faaliyete geçti</div></div>
</div>
</body></html>
