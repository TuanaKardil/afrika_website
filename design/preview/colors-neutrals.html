<!doctype html>
<html lang="tr"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;font-family:"Inter",system-ui,sans-serif;background:#fff}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .swatch{display:flex;align-items:center;gap:10px}
  .chip{width:48px;height:48px;border-radius:2px;border:1px solid #e5e7eb;flex-shrink:0}
  .name{font-size:12px;font-weight:600;color:#212529}
  .hex{font-size:10px;font-weight:600;color:#6b7280;letter-spacing:0.04em}
</style></head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#ffffff"></div><div><div class="name">Background</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="chip" style="background:#f7f8fa"></div><div><div class="name">Surface 2</div><div class="hex">#F7F8FA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#eef1f5"></div><div><div class="name">Surface 3</div><div class="hex">#EEF1F5</div></div></div>
  <div class="swatch"><div class="chip" style="background:#e5e7eb"></div><div><div class="name">Border</div><div class="hex">#E5E7EB</div></div></div>
  <div class="swatch"><div class="chip" style="background:#6b7280"></div><div><div class="name">FG Tertiary</div><div class="hex">#6B7280</div></div></div>
  <div class="swatch"><div class="chip" style="background:#4a5159"></div><div><div class="name">FG Secondary</div><div class="hex">#4A5159</div></div></div>
</div>
</body></html>
