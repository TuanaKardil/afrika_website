<!doctype html>
<html lang="tr"><head><meta charset="utf-8"/>
<style>
  body{margin:0;padding:0;font-family:"Inter",system-ui,sans-serif;background:#0a2351;color:#fff}

  .brand .logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}

  .copy{border-top:1px solid rgba(255,255,255,0.12);padding:14px 24px;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.04em;text-transform:uppercase}
</style></head>
<body>
<div class="footer">
  <div class="brand">
    <div class="logo"><div class="bar"></div><span class="wm">AFRİKA</span><span class="wm amber">HABERLERİ</span></div>

  </div>

  <div><div class="h">BÖLGELER</div><div class="l">Kuzey Afrika</div><div class="l">Batı Afrika</div><div class="l">Doğu Afrika</div></div>
  <div><div class="h">KURUMSAL</div><div class="l">Hakkımızda</div><div class="l">İletişim</div><div class="l">Bülten</div></div>
</div>
<div class="copy">© 2026 Afrika Haberleri. Tüm hakları saklıdır.</div>
