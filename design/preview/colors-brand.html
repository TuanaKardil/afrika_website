<!doctype html>
<html lang="tr"><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;padding:20px;font-family:"Inter",system-ui,sans-serif;background:#fff}
  .row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .swatch{display:flex;align-items:center;gap:12px}
  .chip{width:64px;height:64px;border-radius:2px;border:1px solid #e5e7eb;flex-shrink:0}
  .meta{display:flex;flex-direction:column;gap:2px}
  .name{font-size:13px;font-weight:600;color:#212529;letter-spacing:-0.005em}
  .hex{font-size:11px;font-weight:600;color:#6b7280;letter-spacing:0.04em;font-feature-settings:"tnum"}
  .role{font-size:11px;color:#6b7280}
</style></head>
<body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0a2351"></div><div class="meta"><div class="name">Navy</div><div class="hex">#0A2351</div><div class="role">Header, footer, chrome</div></div></div>
  <div class="swatch"><div class="chip" style="background:#f5b800"></div><div class="meta"><div class="name">Amber</div><div class="hex">#F5B800</div><div class="role">Timestamp dot, live badge</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1e6fb8"></div><div class="meta"><div class="name">Editorial Blue</div><div class="hex">#1E6FB8</div><div class="role">Links, section rule</div></div></div>
  <div class="swatch"><div class="chip" style="background:#212529"></div><div class="meta"><div class="name">Ink</div><div class="hex">#212529</div><div class="role">Body, headlines</div></div></div>
</div>
</body></html>
