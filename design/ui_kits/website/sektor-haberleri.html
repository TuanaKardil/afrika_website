<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sektör Haberleri — Afrika Haberleri</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; color: #212529; }
  @keyframes ahPulse { 0% { box-shadow: 0 0 0 0 rgba(196,30,58,0.7); } 70% { box-shadow: 0 0 0 8px rgba(196,30,58,0); } 100% { box-shadow: 0 0 0 0 rgba(196,30,58,0); } }
  @keyframes ahMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  input::placeholder { color: rgba(255,255,255,0.55); }
  ::-webkit-scrollbar { height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=9"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="BreakingTicker.jsx"></script>
<script type="text/babel" src="RegionBar.jsx"></script>
<script type="text/babel" src="ArticleCard.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const D = window.AH_DATA;

  const SECTOR_LIST = [
    { name: "İnşaat & Müteahhitlik", featured: true },
    { name: "Enerji" },
    { name: "Savunma Sanayi" },
    { name: "Madencilik" },
    { name: "Tekstil & Hazır Giyim" },
    { name: "Kozmetik & Hijyen" },
    { name: "Demir-Çelik & Sanayi" },
    { name: "Tarım & Gıda" },
    { name: "Otomotiv" },
    { name: "Ambalaj & Geri Dönüşüm" },
    { name: "Bankacılık & Finans" },
    { name: "Beyaz Eşya & Ev Aletleri" },
    { name: "Çimento & İnşaat Malzemeleri" },
    { name: "Ev Tekstili & Halı" },
    { name: "Gayrimenkul & Konut" },
    { name: "Havacılık & Sivil Havacılık" },
    { name: "HVAC-R (Isıtma-Soğutma)" },
    { name: "Kimya & Petrokimya" },
    { name: "Lojistik & Taşımacılık" },
    { name: "Makine & Yedek Parça" },
    { name: "Mobilya & Dekorasyon" },
    { name: "Perakende & E-ticaret" },
    { name: "Sağlık & Sağlık Turizmi" },
    { name: "Teknoloji & Yazılım" },
    { name: "Turizm & Otelcilik" },
    { name: "Diğer Sektörler" },
  ];

  // Build pool (replicate base articles, assign sectors deterministically so filters return results)
  const BASE = [D.LEAD_ARTICLE, ...D.SECONDARY, ...D.SECTOR_BLOCK, ...D.COUNTRY_BLOCK,
    ...D.SIDEBAR_LIST.map(a => ({ ...a, imgGrad: "linear-gradient(135deg,#143063,#1e6fb8)", excerpt: "Detaylar için habere göz atın." }))];
  const POOL = [];
  BASE.forEach((a, i) => {
    POOL.push({ ...a, sector: SECTOR_LIST[i % SECTOR_LIST.length].name, id: a.id + "-a" });
    POOL.push({ ...a, sector: SECTOR_LIST[(i + 7) % SECTOR_LIST.length].name, id: a.id + "-b", title: a.title });
  });

  const App = () => {
    const [selected, setSelected] = React.useState(new Set());
    const [q, setQ] = React.useState("");
    const [sort, setSort] = React.useState("yeni");

    const toggle = (name) => {
      const n = new Set(selected);
      if (n.has(name)) n.delete(name); else n.add(name);
      setSelected(n);
    };
    const allSelected = selected.size === 0;

    let filtered = POOL.filter(a => {
      if (!allSelected && !selected.has(a.sector)) return false;
      if (q && !a.title.toLowerCase().includes(q.toLowerCase())) return false;
      return true;
    });

    return (
      <div data-screen-label="Sektör Haberleri">
        <Header />
        <Nav />
        <RegionBar />
        <BreakingTicker />

        <section style={s.head}>
          <div style={s.headInner}>
            <div style={s.crumbs}>
              <a href="index.html" style={s.crumb}>Anasayfa</a>
              <span style={s.sep}>/</span>
              <span style={s.crumbActive}>Sektör Haberleri</span>
            </div>
            <div style={s.titleRow}>
              <div>
                <div style={s.eyebrow}>SEKTÖR ARŞİVİ</div>
                <h1 style={s.h1}>Sektör Haberleri</h1>
                <div style={s.sub}>Birden fazla sektör seçerek haberleri kombinleyin · {filtered.length} haber</div>
              </div>
              <div style={s.searchBox}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0a2351" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Sektör haberlerinde ara…" style={s.searchInput}/>
              </div>
            </div>
          </div>
        </section>

        {/* Filter panel */}
        <div style={s.filterBar}>
          <div style={s.filterInner}>
            <div style={s.filterTop}>
              <div>
                <div style={s.filterTitle}>SEKTÖR FİLTRESİ</div>
                <div style={s.filterHelper}>Birden fazla sektör seçebilirsiniz; sonuçlar otomatik kombinlenir.</div>
              </div>
              <div style={s.filterMeta}>
                <span style={s.countBadge}>{selected.size === 0 ? "TÜM SEKTÖRLER" : `${selected.size} SEKTÖR SEÇİLİ`}</span>
                {selected.size > 0 && (
                  <a href="#" onClick={(e) => { e.preventDefault(); setSelected(new Set()); }} style={s.clear}>✕ Temizle</a>
                )}
              </div>
            </div>

            <div style={s.chipGrid}>
              {/* All-sectors chip */}
              <a href="#" onClick={(e) => { e.preventDefault(); setSelected(new Set()); }}
                 style={{
                   ...s.chip,
                   background: allSelected ? "#0a2351" : "#fff",
                   color: allSelected ? "#fff" : "#0a2351",
                   borderColor: allSelected ? "#0a2351" : "#0a2351",
                   fontWeight: 800,
                 }}>
                {allSelected && <span style={s.tick}>✓ </span>}Tüm Sektörler
              </a>
              {SECTOR_LIST.map(sec => {
                const on = selected.has(sec.name);
                return (
                  <a key={sec.name} href="#"
                     onClick={(e) => { e.preventDefault(); toggle(sec.name); }}
                     style={{
                       ...s.chip,
                       background: on ? "#1e6fb8" : "#fff",
                       color: on ? "#fff" : "#212529",
                       borderColor: on ? "#1e6fb8" : "#e5e7eb",
                       fontWeight: on ? 700 : 600,
                     }}>
                    {on && <span style={s.tick}>✓ </span>}
                    {sec.name}
                  </a>
                );
              })}
            </div>

            <div style={s.sortRow}>
              <span style={s.sortLabel}>SIRALA</span>
              <div style={s.sortGroup}>
                {[["yeni","En Yeni"]].map(([k,l]) => (
                  <a key={k} href="#" onClick={(e) => { e.preventDefault(); setSort(k); }}
                     style={{
                       ...s.sortLink,
                       color: sort === k ? "#0a2351" : "#6b7280",
                       borderBottom: sort === k ? "2px solid #f5b800" : "2px solid transparent",
                     }}>{l}</a>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Active filter strip */}
        {selected.size > 0 && (
          <div style={s.activeWrap}>
            <div style={s.activeInner}>
              <span style={s.activeLabel}>SEÇİLİ SEKTÖRLER:</span>
              {[...selected].map(name => (
                <span key={name} style={s.activeChip}>
                  {name}
                  <span onClick={() => toggle(name)} style={s.x}>✕</span>
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Results */}
        <section style={s.results}>
          {filtered.length === 0 ? (
            <div style={s.empty}>
              <div style={s.emptyIcon}>📭</div>
              <div style={s.emptyTitle}>Sonuç bulunamadı</div>
              <div style={s.emptySub}>Farklı bir sektör seçin veya arama terimini değiştirin.</div>
            </div>
          ) : (
            <div className="ah-grid-4" style={s.grid}>
              {filtered.map(a => (
                <div key={a.id}>
                  <ArticleCard article={a} />
                </div>
              ))}
            </div>
          )}
        </section>

        <Footer />
      </div>
    );
  };

  const s = {
    head: { background: "#f6f7f9", borderBottom: "1px solid #e5e7eb", paddingTop: 28, paddingBottom: 32 },
    headInner: { maxWidth: 1280, margin: "0 auto", padding: "0 24px" },
    crumbs: { display: "flex", alignItems: "center", gap: 8, fontSize: 12, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 18 },
    crumb: { color: "#1e6fb8", textDecoration: "none" },
    sep: { color: "#9ca3af" },
    crumbActive: { color: "#6b7280" },
    titleRow: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 24, flexWrap: "wrap" },
    eyebrow: { fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", color: "#1e6fb8", marginBottom: 8 },
    h1: { fontSize: 44, fontWeight: 800, lineHeight: 1.05, letterSpacing: "-0.025em", color: "#0a2351", margin: 0 },
    sub: { fontSize: 13, color: "#6b7280", marginTop: 10 },
    searchBox: { display: "flex", alignItems: "center", gap: 10, background: "#fff", border: "1px solid #e5e7eb", borderRadius: 2, padding: "0 14px", height: 44, width: 320 },
    searchInput: { background: "transparent", border: 0, outline: 0, flex: 1, fontFamily: "inherit", fontSize: 14, color: "#212529" },

    filterBar: { background: "#fff", borderBottom: "1px solid #e5e7eb" },
    filterInner: { maxWidth: 1280, margin: "0 auto", padding: "20px 24px" },
    filterTop: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16, flexWrap: "wrap" },
    filterTitle: { fontSize: 12, fontWeight: 800, letterSpacing: "0.1em", color: "#0a2351" },
    filterHelper: { fontSize: 12, color: "#6b7280", marginTop: 4 },
    filterMeta: { display: "flex", alignItems: "center", gap: 12 },
    countBadge: { fontSize: 11, fontWeight: 800, letterSpacing: "0.06em", padding: "5px 10px", background: "#0a2351", color: "#fff", borderRadius: 2 },
    clear: { fontSize: 11, fontWeight: 700, letterSpacing: "0.04em", color: "#c41e3a", textDecoration: "none", textTransform: "uppercase" },

    chipGrid: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 },
    chip: { display: "inline-flex", alignItems: "center", gap: 4, padding: "7px 13px", border: "1px solid", fontSize: 12, fontWeight: 600, letterSpacing: "-0.005em", textDecoration: "none", borderRadius: 2, whiteSpace: "nowrap", cursor: "pointer", transition: "background 100ms" },
    tick: { fontWeight: 800, fontSize: 11 },
    featuredDot: { width: 5, height: 5, borderRadius: "50%", background: "#f5b800", marginLeft: 4 },

    sortRow: { display: "flex", alignItems: "center", gap: 16, paddingTop: 12, borderTop: "1px solid #f3f4f6" },
    sortLabel: { fontSize: 11, fontWeight: 800, letterSpacing: "0.1em", color: "#0a2351" },
    sortGroup: { display: "flex", gap: 18 },
    sortLink: { fontSize: 12, fontWeight: 700, letterSpacing: "0.04em", textDecoration: "none", paddingBottom: 4, textTransform: "uppercase" },

    activeWrap: { background: "#fff8e0", borderBottom: "1px solid #f5b800" },
    activeInner: { maxWidth: 1280, margin: "0 auto", padding: "10px 24px", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" },
    activeLabel: { fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", color: "#0a2351" },
    activeChip: { display: "inline-flex", alignItems: "center", gap: 8, fontSize: 12, fontWeight: 600, padding: "4px 10px", background: "#0a2351", color: "#fff", borderRadius: 2 },
    x: { cursor: "pointer", opacity: 0.7, fontSize: 10 },

    results: { maxWidth: 1280, margin: "0 auto", padding: "32px 24px 0" },
    grid: { display: "grid", gridTemplateColumns: "repeat(4, minmax(0,1fr))", gap: 20, alignItems: "stretch" },
    sectorTag: { fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", color: "#1e6fb8", marginTop: 8, textTransform: "uppercase" },
    empty: { padding: "80px 24px", textAlign: "center" },
    emptyIcon: { fontSize: 40, marginBottom: 14 },
    emptyTitle: { fontSize: 22, fontWeight: 800, color: "#0a2351", marginBottom: 6, letterSpacing: "-0.01em" },
    emptySub: { fontSize: 14, color: "#6b7280" },
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
