<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Afrika Haberleri</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #fff; color: #212529; }
  @keyframes ahPulse { 0% { box-shadow: 0 0 0 0 rgba(196,30,58,0.7); } 70% { box-shadow: 0 0 0 8px rgba(196,30,58,0); } 100% { box-shadow: 0 0 0 0 rgba(196,30,58,0); } }
  @keyframes ahMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  input::placeholder { color: rgba(255,255,255,0.55); }
  ::-webkit-scrollbar { height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=10"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="BreakingTicker.jsx"></script>
<script type="text/babel" src="RegionBar.jsx"></script>
<script type="text/babel" src="ArticleCard.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="SectionBlock.jsx"></script>
<script type="text/babel" src="IhaleStrip.jsx"></script>
<script type="text/babel" src="Newsletter.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const App = () => {
    const D = window.AH_DATA;
    return (
      <div data-screen-label="Anasayfa">
        <Header />
        <Nav />
        <RegionBar />
        <BreakingTicker />
        <Hero />
        <SectionBlock eyebrow="SON HABERLER" items={D.SECTOR_BLOCK.concat(D.COUNTRY_BLOCK)} action="Tümünü Gör" />
        <IhaleStrip />
        <SectionBlock eyebrow="AFRİKA YATIRIM FIRSATLARI" items={D.COUNTRY_BLOCK} action="Tümünü Gör" />
        <Newsletter />
        <Footer />
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
